name: Publish Python Package

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e '.[test]'
    - name: Run unit tests
      run: |
        python -m pytest -m "not integration"

  integration:
    needs: [unit]
    runs-on: ubuntu-latest
    env:
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_AUTH_STRING: ${{ secrets.SPOTIFY_AUTH_STRING }}
      SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Cache playwright
      id: cache-playwright
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright/
        key: ${{ runner.os }}-browsers
    - name: Cache auth artifacts
      uses: actions/cache@v5
      with:
        path: ~/.config/esporifai
        key: ${{ runner.os }}-spotify-auth-v3
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e '.[test]'
    - name: Install Chromium
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: |
        python -m playwright install chromium
    - name: Ensure auth works
      run: |
        python -m esporifai auth --status
        python -m esporifai auth --force
    - name: Run integration tests
      run: |
        python -m pytest -m integration

  deploy:
    runs-on: ubuntu-latest
    needs: [unit, integration]
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build twine
    - name: Build distribution
      run: |
        python -m build
        python -m twine check dist/*
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_TOKEN }}
